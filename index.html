<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karim & Rawan Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    background:#faf6ef;
    color:#5c4630;
    font-family:Poppins,sans-serif;
    overflow-x:hidden;

}


section{

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;

}


.gold{

    color:#b88a44;

}


.hidden{

    opacity:0;
    transform:translateY(50px);
    transition:1s;

}


.show{

    opacity:1;
    transform:none;

}



/* ENVELOPE */

#opening{

    flex-direction:column;

}



.envelope{

    width:360px;
    height:240px;
    position:relative;
    cursor:pointer;
    perspective:1000px;

}


.body{

    position:absolute;
    width:100%;
    height:100%;
    background:#d4b07a;
    border-radius:12px;
    box-shadow:0 30px 50px #0002;

}


.flap{

    position:absolute;
    top:0;
    width:0;
    height:0;

    border-left:180px solid transparent;
    border-right:180px solid transparent;
    border-top:130px solid #b88a44;

    transform-origin:top;
    transition:1s;

    z-index:5;

}


.card{

    position:absolute;

    width:300px;
    height:210px;

    background:white;

    left:30px;
    top:40px;

    border-radius:10px;

    padding:30px;

    text-align:center;

    box-shadow:0 20px 40px #0003;

    transition:1s;

    z-index:2;

}



.open .flap{

    transform:rotateX(180deg);

}


.open .card{

    transform:translateY(-180px);

}



.tap{

    margin-top:40px;
    letter-spacing:3px;

}


/* MAIN */

.hero{

    text-align:center;

}


h1{

    font-family:"Cormorant Garamond";
    font-size:70px;
    margin:10px;

}


p{

    font-size:20px;

}


/* DECOR */

.flower{

position:absolute;
font-size:80px;
opacity:.15;

}


.one{
top:10%;
left:5%;
}

.two{

bottom:10%;
right:5%;

}


/* COUNTDOWN */


.count{

display:flex;
gap:20px;
justify-content:center;

}


.box{

background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px #0002;

}



.number{

font-size:40px;
font-family:"Cormorant Garamond";

}



button{

background:#b88a44;
color:white;
border:0;
padding:15px 30px;
border-radius:30px;
cursor:pointer;

}



@media(max-width:600px){

h1{

font-size:45px;

}


.envelope{

width:300px;

}


.flap{

border-left-width:150px;
border-right-width:150px;

}

}



</style>

</head>


<body>


<section id="opening">


<div class="flower one">🌸</div>
<div class="flower two">🌿</div>


<div class="envelope" onclick="openEnvelope(this)">


<div class="body"></div>

<div class="flap"></div>


<div class="card">

<h2>
Karim & Rawan
</h2>

<p>
Wedding Invitation
</p>

</div>


</div>


<div class="tap">
Tap to open
</div>


</section>





<section class="hidden hero">


<div>


<h1>
Karim Hossam
<br>
<span class="gold">&</span>
<br>
Rawan El-Sayed
</h1>


<p>
We joyfully invite you to celebrate the beginning of our forever.
</p>


<h2>
25 July 2026
</h2>


<h3>
8:00 PM
</h3>


</div>

</section>





<section class="hidden">


<div style="text-align:center">


<h1>
Countdown
</h1>


<div class="count">

<div class="box">
<div class="number" id="days">0</div>
Days
</div>


<div class="box">
<div class="number" id="hours">0</div>
Hours
</div>


<div class="box">
<div class="number" id="minutes">0</div>
Minutes
</div>


</div>


</div>

</section>





<section class="hidden">


<div style="text-align:center">

<h1>
Venue
</h1>


<h2>
Four Seasons - Shubra El-Kheima
</h2>


<a href="https://share.google/SBqL1qlwO74Se5qvA">

<button>
Open Google Maps
</button>

</a>


<h2>
Dress Code
</h2>


<p>
Formal
</p>


</div>


</section>




<script>


function openEnvelope(el){

el.classList.add("open");

}


const weddingDate =
new Date("July 25 2026 20:00:00")
.getTime();


setInterval(()=>{


let now=new Date().getTime();

let distance=weddingDate-now;


document.getElementById("days").innerHTML=
Math.floor(distance/(1000*60*60*24));


document.getElementById("hours").innerHTML=
Math.floor(distance/(1000*60*60)%24);


document.getElementById("minutes").innerHTML=
Math.floor(distance/(1000*60)%60);


},1000);





const observer=new IntersectionObserver(entries=>{


entries.forEach(e=>{

if(e.isIntersecting){

e.target.classList.add("show");

}

});


});


document.querySelectorAll(".hidden")
.forEach(el=>observer.observe(el));


</script>


</body>
</html>
